name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test (Go 1.23)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          check-latest: true
          cache: true

      - name: Verify Dependencies
        run: go mod verify

      - name: Check Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted correctly:"
            gofmt -l .
            exit 1
          fi

      - name: Go Vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt pytest-cov

      - name: Run Go Unit Tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run Python Unit Tests
        run: |
          PYTHONPATH=api python -m pytest api/tests --cov=api/app --cov-report=xml:api/coverage.xml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "web/package-lock.json"

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: web

      - name: Run Frontend Unit Tests
        run: npm run test:coverage
        working-directory: web

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out,api/coverage.xml,web/coverage/clover.xml
          flags: unittests

      - name: Test Build Package
        run: go build -v -ldflags="-s -w" -o cloudinferops cmd/cloudinferops/main.go
