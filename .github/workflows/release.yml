name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    env:
      NEXT_TAG: ""

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Determine Next Semantic Version
        id: next_version
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n1 || true)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v1.0.0"
          else
            VERSION_PART=${LATEST_TAG#v}
            # Parse version parts
            IFS='.' read -r major minor patch <<< "$VERSION_PART"
            if [ "$major" -eq 0 ]; then
              NEXT_TAG="v1.0.0"
            else
              next_patch=$((patch + 1))
              NEXT_TAG="v${major}.${minor}.${next_patch}"
            fi
          fi
          echo "NEXT_TAG=${NEXT_TAG}" >> $GITHUB_ENV
          echo "Calculated next tag: ${NEXT_TAG}"

      - name: Create and Push Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ env.NEXT_TAG }}"
          git push origin "${{ env.NEXT_TAG }}"

      - name: Compile Cross-Platform Binaries
        run: |
          mkdir -p dist

          # Extract dynamic build metadata
          COMMIT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PKG="github.com/shivamshashank/CloudInferOps/internal/cli"
          LDFLAGS="-s -w -X ${PKG}.Version=${{ env.NEXT_TAG }} -X ${PKG}.Commit=${COMMIT_SHA} -X ${PKG}.BuildDate=${BUILD_DATE}"

          # Linux AMD64
          echo "Compiling Linux AMD64 binary..."
          env GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/cloudinferops-linux-amd64 cmd/cloudinferops/main.go

          # Linux ARM64
          echo "Compiling Linux ARM64 binary..."
          env GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/cloudinferops-linux-arm64 cmd/cloudinferops/main.go

          # macOS AMD64
          echo "Compiling macOS AMD64 binary..."
          env GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/cloudinferops-darwin-amd64 cmd/cloudinferops/main.go

          # macOS ARM64
          echo "Compiling macOS ARM64 binary..."
          env GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/cloudinferops-darwin-arm64 cmd/cloudinferops/main.go

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEXT_TAG }}
          name: Release ${{ env.NEXT_TAG }}
          body: |
            ## 🚀 CloudInferOps Release ${{ env.NEXT_TAG }}

            Automated production release generated after merging to `main`.

            ### 📦 Supported Platform Downloads

            - **Linux (x86_64 / amd64)**: `cloudinferops-linux-amd64`
            - **Linux (arm64 / aarch64)**: `cloudinferops-linux-arm64`
            - **macOS (Intel / amd64)**: `cloudinferops-darwin-amd64`
            - **macOS (Apple Silicon / arm64)**: `cloudinferops-darwin-arm64`

            ---
            *Built with Go 1.23*
          draft: false
          prerelease: false
          files: |
            dist/cloudinferops-linux-amd64
            dist/cloudinferops-linux-arm64
            dist/cloudinferops-darwin-amd64
            dist/cloudinferops-darwin-arm64
