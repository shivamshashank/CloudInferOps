name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write


jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Determine Next Semantic Version
        id: next_version
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n1 || true)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v1.0.0"
          else
            VERSION_PART=${LATEST_TAG#v}
            IFS='.' read -r major minor patch <<< "$VERSION_PART"
            if [ "$major" -eq 0 ]; then
              NEXT_TAG="v1.0.0"
            else
              NEXT_TAG="v${major}.${minor}.$((patch+1))"
            fi
          fi

          echo "next_tag=${NEXT_TAG}" >> $GITHUB_OUTPUT

      - name: Create and Push Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next_version.outputs.next_tag }}"
          git push origin "${{ steps.next_version.outputs.next_tag }}"

      - name: Build Linux Binaries
        run: |
          mkdir -p dist

          COMMIT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PKG="github.com/shivamshashank/CloudInferOps/internal/cli"

          LDFLAGS="-s -w \
          -X ${PKG}.Version=${{ steps.next_version.outputs.next_tag }} \
          -X ${PKG}.Commit=${COMMIT_SHA} \
          -X ${PKG}.BuildDate=${BUILD_DATE}"

          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" \
            -o dist/cloudinferops-linux-amd64 cmd/cloudinferops/main.go

          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" \
            -o dist/cloudinferops-linux-arm64 cmd/cloudinferops/main.go

      - name: Generate SHA256 Checksums
        run: |
          cd dist
          sha256sum cloudinferops-linux-* > checksums.txt
          cat checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.next_tag }}
          name: Release ${{ steps.next_version.outputs.next_tag }}
          body: |
            ## 🚀 CloudInferOps ${{ steps.next_version.outputs.next_tag }}

            ### Downloads

            - cloudinferops-linux-amd64
            - cloudinferops-linux-arm64

            SHA256 checksums are provided in `checksums.txt`.
          draft: false
          prerelease: false
          files: |
            dist/cloudinferops-linux-amd64
            dist/cloudinferops-linux-arm64
            dist/checksums.txt

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/shivamshashank/cloudinferops-gateway:latest
            ghcr.io/shivamshashank/cloudinferops-gateway:${{ steps.next_version.outputs.next_tag }}

      - name: Build and Push Portal Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ui
          push: true
          tags: |
            ghcr.io/shivamshashank/cloudinferops-ui:latest
            ghcr.io/shivamshashank/cloudinferops-ui:${{ steps.next_version.outputs.next_tag }}
